<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Markah Peperiksaan Mac 2026 - SMK SELIRIK</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --night-blue: #151B54;
            --soft-blue-grad: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--soft-blue-grad);
            min-height: 100vh;
            color: #333;
        }

        /* Header & Logo */
        header {
            background-color: var(--night-blue);
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); /* Pattern abstrak korporat */
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 5px solid #ffd700;
        }

        header img { width: 80px; margin-bottom: 10px; }
        header h1 { font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        header p { font-size: 0.9rem; opacity: 0.9; }

        .container { max-width: 1200px; margin: 20px auto; padding: 20px; text-align: center; }

        /* Login Section */
        #login-section {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 50px auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            background: var(--night-blue);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            margin: 5px;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Dashboard Section */
        #dashboard { display: none; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        th, td {
            border: 1px solid #eee;
            padding: 10px;
            text-align: center;
        }

        th { background: var(--night-blue); color: white; }
        tr:nth-child(even) { background: #f9f9f9; }

        /* Ulasan Dropdown */
        .ulasan-select { width: auto; font-size: 0.8rem; }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #666;
            margin-top: 40px;
        }

        /* Print Styles */
        @media print {
            body { background: white; }
            #dashboard, #login-section, header, footer, .no-print { display: none !important; }
            #print-area { display: block !important; }
            .page-break { page-break-after: always; }
            .slip-header { width: 100%; margin-bottom: 20px; }
            .slip-header img { width: 100%; }
        }

        #print-area { display: none; padding: 20px; background: white; }

        /* Mobile Friendly */
        @media (max-width: 600px) {
            header h1 { font-size: 1.1rem; }
            .container { padding: 10px; }
            table { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/fYyZdyLz/Logo-Selirik.png" alt="Logo SMK Selirik">
    <h1>SMK SELIRIK, KAPIT</h1>
    <p>DASHBOARD MARKAH PEPERIKSAAN MAC 2026</p>
</header>

<div class="container">
    <div id="login-section">
        <h3>Log Masuk Guru Tingkatan</h3>
        <input type="text" id="username" placeholder="ID: GT2026">
        <input type="password" id="password" placeholder="Kata Laluan">
        <button onclick="login()">Log Masuk</button>
        <p id="login-err" style="color:red; font-size:0.8rem; margin-top:10px;"></p>
    </div>

    <div id="dashboard">
        <div class="card no-print">
            <h4>Pilih Tingkatan & Kelas</h4>
            <select id="select-tingkatan" onchange="loadClasses()">
                <option value="">-- Pilih Tingkatan --</option>
                <option value="1">Tingkatan 1</option>
                <option value="2">Tingkatan 2</option>
                <option value="3">Tingkatan 3</option>
                <option value="4">Tingkatan 4</option>
                <option value="5">Tingkatan 5</option>
            </select>
            <select id="select-kelas" onchange="filterData()">
                <option value="">-- Pilih Kelas --</option>
            </select>
            <div style="margin-top: 10px;">
                <button onclick="saveToLocal()">Simpan (Local)</button>
                <button onclick="logout()">Keluar</button>
            </div>
        </div>

        <div id="summary-stats" class="card no-print" style="display:none;">
            </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:10px;">
                <h4 id="table-title">Rekod Markah Keseluruhan</h4>
                <div class="no-print">
                    <button onclick="printOverall()">Cetak Jadual Kelas</button>
                    <button onclick="printBulkSlips()">Cetak Slip Pukal</button>
                </div>
            </div>
            <div id="table-container">
                <p>Sila pilih kelas untuk memaparkan data.</p>
            </div>
        </div>
    </div>
</div>

<div id="print-area"></div>

<footer>
    hakcipta NDJE@Selirik, Kapit 2026
</footer>

<script>
    const CONFIG = {
        csvLinks: {
            1: "https://docs.google.com/spreadsheets/d/e/2PACX-1vS9ngcL37KMX8ZDsGKomo7Lv6yowNqFdcWciJuvS1UkUU6aFHI_VKuFDLP1d0fKtMlXTW8APMYD38xZ/pub?gid=1419213935&single=true&output=csv",
            2: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSD6QwXil_0_gA0OBb2t82FneuCt68Sp7P9-He4zyBPEoaVHkJent8hiCSFPa33F-AEmR9BgeEogpt-/pub?gid=1419213935&single=true&output=csv",
            3: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQg40cTCNS7MVyZVA3-8sZkbNtVT_Db9abxz6xhv1ccZ5ZksWIy0qyn8y30lqxG9G9YN1TOMBXF7WCY/pub?gid=1419213935&single=true&output=csv",
            4: "https://docs.google.com/spreadsheets/d/e/2PACX-1vR831uDWcPfxf9zOj-mekolv_DMkdsYRMdVsxoLcKqwL88z-tetvP57ti5wB5M2dYIXYVZf9eX7R6Q8/pub?gid=1615224868&single=true&output=csv",
            5: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRq9lzeK5sombRvA2WRgEYGygUdZwEfifZHVy4IMZiRD7c-yll60qkA4pXeBBocqJsRV6GpM1uazU_B/pub?gid=1615224868&single=true&output=csv"
        },
        scripts: {
            1: "https://script.google.com/macros/s/AKfycbzI4uyIyKd5O0do0KQRbdjuzay3OMUBpN0EuJCOtbcAI4dAmh0Fj_n_CTsCX9mwdeNsEg/exec",
            2: "https://script.google.com/macros/s/AKfycbw0BakCGDqNheCPyzdqrstH8jM0Je3D1fM2oJTB0odH5UIAO08GNdOSIqWMK6e1ZQmL/exec",
            3: "https://script.google.com/macros/s/AKfycbwGVcnpPo2ASHnvXyvfCB2PQSYi9XtITDEF6YGC7G0idbXmw13TixmF02846I2593dH/exec",
            4: "https://script.google.com/macros/s/AKfycbztn63Bhbjl6EKwvVFadcYNY3jzA0Nuty-_veEYQBkLenytXxQWZY5h7GweO3maDLn0/exec",
            5: "https://script.google.com/macros/s/AKfycbxg5tGuWQ6U8Aou1tG-m5PXWEyfbfcq_maaL_W8awU35NiBf3v-7c8peqQMeBCIqIdUsQ/exec"
        },
        ulasanOptions: [
            "Teruskan berusaha untuk kejayaan lebih cemerlang untuk masa depan yang gemilang",
            "Sekalung tahniah atas kejayaan anda. Teruskan Usaha dengan lebih gigih untuk kejayaan lebih baik.",
            "Prestasi anda memberangsangkan. Usaha lagi untuk kejayaan yang lebih cemerlang",
            "Anda mesti mempunyai motivasi yang tinggi dan minat terhadap pengajaran dan pembelajaran di dalam kelas. Anda mampu mencapai lebih kecemerlangan dengan bersikap proaktif di dalam kelas.",
            "Keputusan semasa menunjukkan anda masih belum menemui cara belajar yang betul bagi mendapatkan keputusan yang lebih baik",
            "Keputusan masih ditahap sederhana. Ia memerlukan komitmen daripada anda untuk memperbaiki pencapaian",
            "Anda harus berusaha dengan lebih gigih bagi mendapatkan keputusan yang sebaiknya. Jangan berlengah lagi",
            "Beberapa mata pelajaran masih belum mencapai tahap yang sepatutnya. Usaha dengan lebih kuat bagi memperbaiki prestasi",
            "Berikan lebih tumpuan kepada matapelajaran tertentu.",
            "Kejayaan tertakluk kepada daya usaha anda. Oleh itu tingkatkan usaha anda untuk kejayaan yang lebih baik daripada hari ini.",
            "Usaha anda telah menunjukkan hasil yang agak baik. Gandakan usaha anda untuk mencapai kejayaan yang lebih baik.",
            "Usaha dengan lebih kuat lagi. Pastikan keputusan kali ini dapat diubah melalui kerja keras selepas ini",
            "Usaha berterusan menjamin keputusan yang lebih baik pada masa akan datang",
            "Tingkatkan usaha anda. Anda pasti akan berjaya dengan lebih baik daripada hari ini.",
            "Pencapaian memuaskan. Teruskan usaha anda. Anda pasti berjaya.",
            "Hargai masa dan tingkatkan usaha anda.",
            "Pencapaian masih lemah. Tingkatkan usaha dan ubah sikap demi masa depan anda.",
            "Hargailah masa dan buangkan sikap kerap ponteng kelas. Tingkatkan usaha dan ubah sikap demi masa depan anda."
        ]
    };

    let allData = [];
    let filteredData = [];

    // Login Logic
    function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(u === 'GT2026' && p === 'GT2026') {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else {
            document.getElementById('login-err').innerText = 'ID atau Kata Laluan Salah!';
        }
    }

    function logout() {
        location.reload();
    }

    // Load Data based on Form
    async function loadClasses() {
        const ting = document.getElementById('select-tingkatan').value;
        if(!ting) return;

        const url = CONFIG.csvLinks[ting];
        Papa.parse(url, {
            download: true,
            header: false, // Kita guna kolum manual mengikut spesifikasi
            complete: function(results) {
                allData = results.data;
                const classes = [...new Set(allData.map(row => row[3]))].filter(c => c && c !== 'KELAS');
                const selectKelas = document.getElementById('select-kelas');
                selectKelas.innerHTML = '<option value="">-- Pilih Kelas --</option>';
                classes.forEach(c => {
                    selectKelas.innerHTML += `<option value="${c}">${c}</option>`;
                });
            }
        });
    }

    function filterData() {
        const kelas = document.getElementById('select-kelas').value;
        const ting = document.getElementById('select-tingkatan').value;
        if(!kelas) return;

        // Filter: Hanya yang ada nama (Col C) dan kelas sepadan (Col D)
        filteredData = allData.filter(row => row[3] === kelas && row[2] && row[2] !== 'NAMA');
        
        renderTable(ting, kelas);
    }

    function getSubjekMapping(ting, kelas) {
        // Objek pemetaan subjek mengikut tingkatan dan kelas
        const maps = {
            'T123': [
                {n: 'BM', m: 4, g: 5}, {n: 'ENG', m: 6, g: 7}, {n: 'MATHS', m: 8, g: 9},
                {n: 'SEJ', m: 10, g: 11}, {n: 'SN', m: 12, g: 13}, {n: 'GEO', m: 14, g: 15},
                {n: 'BIB', m: 16, g: 17}, {n: 'PM', m: 18, g: 19}, {n: 'PI', m: 20, g: 21},
                {n: 'RBT', m: 22, g: 23}, {n: 'ASK', m: 24, g: 25}, {n: 'PSV', m: 26, g: 27},
                {n: 'PJPK', m: 40, g: 41}
            ],
            'T45': [
                {n: 'BM', m: 4, g: 5}, {n: 'SEJ', m: 6, g: 7}, {n: 'ENG', m: 8, g: 9},
                {n: 'MATHS', m: 10, g: 11}, {n: 'PM', m: 12, g: 13}, {n: 'PI', m: 14, g: 15},
                {n: 'SN', m: 16, g: 17}, {n: 'PSV', m: 18, g: 19}, {n: 'BIB', m: 20, g: 21},
                {n: 'RC', m: 22, g: 23}, {n: 'PP', m: 24, g: 25}, {n: 'FIZ', m: 26, g: 27},
                {n: 'KIM', m: 28, g: 29}, {n: 'BIO', m: 30, g: 31}, {n: 'ADD MATHS', m: 32, g: 33},
                {n: 'SK', m: 34, g: 35}, {n: 'KAG', m: 36, g: 37}, {n: 'PJPK', m: 62, g: 63}
            ]
        };

        let currentMap = (ting <= 3) ? maps.T123 : maps.T45;
        
        // Tapis subjek berdasarkan kelas (Contoh: 4SN hanya ada subjek sains)
        // Logik tapis ini boleh dikembangkan mengikut senarai "Sebaik Guru Kelas pilih kelas..."
        return currentMap;
    }

    function renderTable(ting, kelas) {
        const container = document.getElementById('table-container');
        const subjekMap = getSubjekMapping(ting, kelas);
        
        let html = `<table><thead><tr><th>NAMA</th>`;
        subjekMap.forEach(s => html += `<th>${s.n}</th>`);
        html += `<th>JUM</th><th>PURATA</th><th>GP</th><th>KDK</th><th>ULASAN</th></tr></thead><tbody>`;

        filteredData.forEach((row, idx) => {
            // Abaikan jika tiada markah (NULL) - dikesan dari Kolum Jumlah
            const jumCol = (ting <= 3) ? 54 : 78; // BC=54, CA=78 (0-indexed)
            if(!row[jumCol] || row[jumCol] === '0' || row[jumCol] === '') return;

            html += `<tr><td>${row[2]}</td>`;
            subjekMap.forEach(s => {
                const markah = row[s.m] || '-';
                const gred = row[s.g] || '';
                html += `<td>${markah}<br><small>${gred}</small></td>`;
            });

            // Rumusan
            const colIdx = (ting <= 3) ? {j:54, p:55, g:56, k:58, u:60} : {j:78, p:79, g:80, k:83, u:74};
            html += `<td>${row[colIdx.j]}</td><td>${row[colIdx.p]}</td><td>${row[colIdx.g]}</td><td>${row[colIdx.k]}</td>`;
            
            // Ulasan Dropdown
            let options = CONFIG.ulasanOptions.map(opt => `<option value="${opt}" ${row[colIdx.u] === opt ? 'selected' : ''}>${opt}</option>`).join('');
            html += `<td><select class="ulasan-select" onchange="updateUlasan(${idx}, this.value, ${ting})">${options}</select></td>`;
            html += `</tr>`;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    async function updateUlasan(dataIdx, val, ting) {
        const row = filteredData[dataIdx];
        const scriptUrl = CONFIG.scripts[ting];
        
        // Simpan ke Google Sheet melalui Apps Script
        // Format: ?nama=...&kelas=...&ulasan=...
        const params = new URLSearchParams({
            nama: row[2],
            kelas: row[3],
            ulasan: val,
            action: 'updateUlasan'
        });

        try {
            fetch(`${scriptUrl}?${params.toString()}`, { mode: 'no-cors' });
            alert('Ulasan dikemaskini!');
        } catch (e) {
            console.error(e);
        }
    }

    function saveToLocal() {
        localStorage.setItem('dashboard_data', JSON.stringify(filteredData));
        alert('Data disimpan ke storan tempatan (LocalStore).');
    }

    // Cetakan
    function printOverall() {
        const content = document.getElementById('table-container').innerHTML;
        const headerImg = "https://i.ibb.co/670hn3CB/smk-selirik.png";
        const printArea = document.getElementById('print-area');
        
        printArea.innerHTML = `
            <div class="slip-header"><img src="${headerImg}"></div>
            <h2 style="text-align:center">REKOD KEPUTUSAN KESELURUHAN - ${document.getElementById('select-kelas').value}</h2>
            <div style="transform: scale(0.9); transform-origin: top center;">${content}</div>
        `;
        window.print();
    }

    function printBulkSlips() {
        const ting = document.getElementById('select-tingkatan').value;
        const kelas = document.getElementById('select-kelas').value;
        const subjekMap = getSubjekMapping(ting, kelas);
        const headerImg = "https://i.ibb.co/670hn3CB/smk-selirik.png";
        let html = "";

        filteredData.forEach(row => {
            const jumCol = (ting <= 3) ? 54 : 78;
            if(!row[jumCol] || row[jumCol] === '0') return;

            const col = (ting <= 3) ? {j:54, p:55, g:56, k:58, kt:70, u:60, gt:71} : {j:78, p:79, g:80, k:83, kt:101, u:74, gt:102};

            html += `
            <div class="page-break">
                <div class="slip-header"><img src="${headerImg}"></div>
                <h3 style="text-align:center">SLIP KEPUTUSAN PEPERIKSAAN MAC 2026</h3>
                <p>NAMA: ${row[2]} <br> KELAS: ${row[3]}</p>
                <hr>
                <table style="width:100%">
                    <tr><th>SUBJEK</th><th>MARKAH</th><th>GRED</th></tr>`;
            
            subjekMap.forEach(s => {
                if(row[s.m] && row[s.m] !== 'NULL') {
                    html += `<tr><td>${s.n}</td><td>${row[s.m]}</td><td>${row[s.g]}</td></tr>`;
                }
            });

            html += `
                </table>
                <div style="margin-top:20px; display:flex; justify-content:space-between;">
                    <div>
                        <p>Jumlah Markah: ${row[col.j]}</p>
                        <p>Purata: ${row[col.p]} | GP: ${row[col.g]}</p>
                        <p>Kedudukan: ${row[col.k]} / ${filteredData.length}</p>
                    </div>
                    <div>
                        <p>Ulasan Guru: <br> <i>"${row[col.u] || 'Tiada ulasan'}"</i></p>
                    </div>
                </div>
                <div style="margin-top:50px; display:flex; justify-content:space-between;">
                    <div style="text-align:center">
                        ___________________<br>AWIN ANAK ENGGA<br>PENGETUA SMK SELIRIK
                    </div>
                    <div style="text-align:center">
                        ___________________<br>${row[col.gt]}<br>GURU TINGKATAN ${row[3]}
                    </div>
                </div>
            </div>`;
        });

        document.getElementById('print-area').innerHTML = html;
        window.print();
    }
</script>

</body>
</html>
